version: '3.8'

services:
  # 1. Database Service (MySQL)
  db:
    image: mysql:8.0
    restart: always
    command: --port=3307
    environment:
      MYSQL_DATABASE: netflix_db
      MYSQL_ROOT_PASSWORD: Anand@123
    ports:
      - "3307:3307" 

  # 2. Backend Service
  backend:
    build: ./netflix-backend
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3307/netflix_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Anand@123

  # 3. Frontend Service
  frontend:
    build: ./netflix-clone
    ports:
      - "5173:5173"
    depends_on:
      - backend