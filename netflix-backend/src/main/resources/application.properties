spring.application.name=netflix-backend

# 1. SERVER PORT
# Railway automatically PORT variable deta hai, agar nahi milega (Local) toh 8081 chalega.
server.port=${PORT:8081}

# 2. DATABASE CONFIG (Smart Logic: Local + Railway)
# Yahan humne 'netflix_db' ko badal kar 'railway' kar diya hai taaki dashboard se match ho.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:netflix_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Anand@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA & HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. SQL INIT
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# 5. OTHER SETTINGS
spring.jpa.open-in-view=false

